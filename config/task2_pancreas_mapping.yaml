project_name: pancreas_cross_species_ocr_mapping
tissue: Pancreas

inputs:
  human_peak_candidates:
    - /ocean/projects/bio230007p/ikaplow/HumanAtac/Pancreas/peak/idr_reproducibility/idr.optimal_peak.narrowPeak.gz
    - /ocean/projects/bio230007p/ikaplow/HumanAtac/Pancreas/peak/idr_reproducibility/idr.conservative_peak.narrowPeak.gz
    - /ocean/projects/bio230007p/ikaplow/HumanAtac/Pancreas/peak/pooled-rep/rep.pooled.pval0.01.300K.bfilt.narrowPeak.gz
  mouse_peak_candidates:
    - /ocean/projects/bio230007p/ikaplow/MouseAtac/Pancreas/peak/idr_reproducibility/idr.optimal_peak.narrowPeak.gz
    - /ocean/projects/bio230007p/ikaplow/MouseAtac/Pancreas/peak/idr_reproducibility/idr.conservative_peak.narrowPeak.gz
    - /ocean/projects/bio230007p/ikaplow/MouseAtac/Pancreas/peak/pooled-rep/rep.pooled.pval0.01.300K.bfilt.narrowPeak.gz
  human_tss_bed: /ocean/projects/bio230007p/ikaplow/HumanGenomeInfo/gencode.v27.annotation.protTranscript.TSSsWithStrand_sorted.bed
  mouse_tss_bed: /ocean/projects/bio230007p/ikaplow/MouseGenomeInfo/gencode.vM15.annotation.protTranscript.geneNames_TSSWithStrand_sorted.bed

mapping:
  hal_file: /ocean/projects/bio230007p/ikaplow/Alignments/10plusway-master.hal
  hal_liftover_bin: /ocean/projects/bio230007p/gdu1/repos/hal/bin/halLiftover
  human_genome: Human
  mouse_genome: Mouse
  min_reciprocal_overlap: 0.2

annotation:
  enabled: true
  promoter_window_bp: 2000

outputs:
  mapping_dir: results/mapping
  tables_dir: results/tables
  figures_dir: results/figures
  logs_dir: results/logs
  temp_dir: results/mapping/tmp

runtime:
  overwrite: true
